<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/preset-stars@4/tsparticles.preset.stars.bundle.min.js"></script>
  </head>
  <body>
    <div id="tsparticles"></div>
    <script>
    (async () => {
    await loadStarsPreset(tsParticles);

    await tsParticles.load({
        id: "tsparticles",
        options: {
        preset: "stars",
        },
    });
    })();
    </script>
  </body>
</html>
